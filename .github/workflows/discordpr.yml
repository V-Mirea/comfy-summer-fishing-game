name: Notify Discord on PR Activity
on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        if: >-
          github.event_name == 'pull_request' ||
          (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
          github.event_name == 'pull_request_review_comment'
        env:
          TITLE: ${{ github.event.pull_request.title }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          URL: ${{ github.event.pull_request.html_url }}
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          REVIEWER: ${{ github.event.review.user.login }}
          PUSHER: ${{ github.event.sender.login }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_PATH: ${{ github.event.comment.path }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          if [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "opened" ]; then
            PREFIX="New PR"
            MSG=$(jq -n --arg c "$PREFIX, $AUTHOR: $TITLE"$'\n'"$URL" '{content: $c}')
          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "synchronize" ]; then
            PREFIX="New push to PR"
            MSG=$(jq -n --arg c "$PREFIX by $PUSHER: $TITLE"$'\n'"$URL" '{content: $c}')
          elif [ "$EVENT" = "pull_request_review_comment" ]; then
            SNIPPET=$(echo "$COMMENT_BODY" | head -c 150)
            if [ ${#COMMENT_BODY} -gt 150 ]; then
              SNIPPET="${SNIPPET}..."
            fi
            MSG=$(jq -n \
              --arg commenter "$COMMENTER" \
              --arg title "$TITLE" \
              --arg path "$COMMENT_PATH" \
              --arg snippet "$SNIPPET" \
              --arg url "$COMMENT_URL" \
              '{content: ("Review comment by " + $commenter + " on **" + $title + "**\nFile: `" + $path + "`\n> " + $snippet + "\n" + $url)}')
          else
            PREFIX="PR Approved"
            MSG=$(jq -n --arg c "$PREFIX by $REVIEWER: $TITLE"$'\n'"$URL" '{content: $c}')
          fi
          curl -fsS -H "Content-Type: application/json" -d "$MSG" "$WEBHOOK"
